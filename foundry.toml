[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
optimizer = true
optimizer_runs = 200

[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
mainnet = "${RPC_MAINNET}"
base = "${RPC_BASE}"

[profile.demo]
src = "src"
script = "script"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = false
